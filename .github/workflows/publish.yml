name: CI & Publish

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Determine version bump from commit message
        id: bump
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "commit: $MSG"
          if echo "$MSG" | grep -qiE 'BREAKING CHANGE|^[a-z]+!:'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qiE '^feat(\(.*\))?:'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qiE '^fix(\(.*\))?:'; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "type=none" >> "$GITHUB_OUTPUT"
            echo "No version bump needed"
          fi

      - name: Bump version
        if: steps.bump.outputs.type != 'none'
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(npm version ${{ steps.bump.outputs.type }} --no-git-tag-version)
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${NEW_VERSION}"

      - name: Commit and tag version
        if: steps.bump.outputs.type != 'none'
        run: |
          git add package.json package-lock.json
          git commit -m "release: ${{ steps.version.outputs.new_version }}"
          git tag ${{ steps.version.outputs.new_version }}
          git push
          git push --tags

      - name: Publish to npm
        if: steps.bump.outputs.type != 'none'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
