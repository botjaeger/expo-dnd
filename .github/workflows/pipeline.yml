name: Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pages: write
  pull-requests: write

concurrency:
  group: pipeline-main
  cancel-in-progress: false

jobs:
  # ── Step 1: CI ──────────────────────────────────────────────
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── Step 2a: Deploy docs (parallel with example update) ─────
  docs:
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install docs dependencies
        run: cd docs && npm install

      - name: Export docs for web
        run: cd docs && npx expo export --platform web

      - name: Fix SPA routing
        run: cp docs/dist/index.html docs/dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

      - uses: actions/deploy-pages@v4
        id: deployment

  # ── Step 2b: Publish EAS update (parallel with docs) ────────
  example-update:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for src/ or example/ changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(src/|example/)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        with:
          node-version: 20

      - uses: expo/expo-github-action@v8
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install root dependencies
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: npm ci

      - uses: actions/download-artifact@v4
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        with:
          name: dist
          path: dist/

      - name: Install example dependencies
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: cd example && npm install

      - name: Publish update
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          cd example
          eas update --branch preview --message "${MSG:-Manual update}" --platform android
          eas update --branch preview --message "${MSG:-Manual update}" --platform ios
        env:
          MSG: ${{ github.event.head_commit.message }}
          CI: '1'

  # ── Step 3: Release please ──────────────────────────────────
  release-please:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  # ── Step 4: npm publish (only on release) ───────────────────
  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
