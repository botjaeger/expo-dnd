name: Update Example App

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'example/**'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Build the library first (example imports from ../src)
      - name: Install root dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Install example dependencies
        run: cd example && npm install

      - name: Publish update
        run: cd example && eas update --branch preview --message "${MSG:-Manual update}" --platform ios,android
        env:
          MSG: ${{ github.event.head_commit.message }}
          CI: '1'
