name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build the library first (docs imports from file:..)
      - name: Install root dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      # Build the docs web app
      - name: Install docs dependencies
        run: cd docs && npm install

      - name: Export docs for web
        run: cd docs && npx expo export --platform web

      # SPA routing fix: copy index.html to 404.html so client-side routes work
      - name: Fix SPA routing
        run: cp docs/dist/index.html docs/dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

      - uses: actions/deploy-pages@v4
        id: deployment
